<section id="gallery" class="bg-white py-20 md:py-28">
  <div class="container mx-auto px-4">
    <div class="max-w-2xl mx-auto text-center mb-14">
      <span class="text-custom-primary font-heading font-semibold uppercase tracking-widest text-sm">Our Work</span>
      <h2 class="font-heading text-3xl md:text-5xl font-extrabold text-custom-navy mt-3 mb-4">Recent Projects</h2>
      <p class="text-custom-dark-grey text-lg">
        A look at some of our recent window, gutter, roof and exterior cleaning work.
      </p>
    </div>

    <div class="columns-2 md:columns-3 lg:columns-4 gap-4 [column-fill:_balance]">
      @for (media of combinedMedia; track media) {
        <button type="button" (click)="openLightbox(media)" [attr.aria-label]="'View enlarged ' + categoryLabel(media) + ' photo'"
          class="block w-full mb-4 rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-shadow duration-300 break-inside-avoid group focus:outline-none focus-visible:ring-2 focus-visible:ring-custom-focus">
          <img [ngSrc]="media" width="500" height="500"
            class="w-full h-auto transition-transform duration-500 group-hover:scale-105" [alt]="categoryLabel(media) + ' project photo'" />
        </button>
      }
    </div>
  </div>
</section>

@if (selectedImage) {
  <div class="fixed inset-0 bg-custom-navy/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate__animated animate__fadeIn animate__faster"
    (click)="closeLightbox()">
    <button type="button" (click)="closeLightbox()" aria-label="Close image"
      class="absolute top-5 right-5 text-white/80 hover:text-white transition-colors focus-visible:ring-2 focus-visible:ring-custom-focus rounded">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
    <img [ngSrc]="selectedImage" width="900" height="900" (click)="$event.stopPropagation()"
      class="max-h-[85vh] w-auto rounded-xl shadow-2xl" [alt]="categoryLabel(selectedImage) + ' project photo enlarged'" />
  </div>
}
